name: Pack Offline Bundle

on:
  workflow_dispatch:
    inputs:
      gpu_type:
        description: 'GPU type (determines target architecture and HSA config)'
        required: true
        default: 'strix-halo'
        type: choice
        options:
          - strix-halo   # gfx1151 — Ryzen AI Max+ 395 / Max 390
          - phx          # gfx110x — Ryzen AI 300 (Phoenix)
          - strix        # gfx110x + HSA override — Ryzen AI 300 (Strix Point)
          - rdna4        # gfx120x — Radeon RX 9000 series
      image_tag:
        description: 'Image tag prefix (default: current branch name, e.g. develop, latest, v1.0)'
        required: false
        default: ''
        type: string
      image_registry:
        description: 'Registry prefix for custom images (override for forks or private registries)'
        required: false
        default: 'ghcr.io/amdresearch'
        type: string
      create_release:
        description: 'Create a GitHub Release with the bundle'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: read

jobs:
  pack:
    name: "Pack Bundle (${{ inputs.gpu_type }})"
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Check available disk space
        run: df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run pack command
        env:
          GPU_TYPE: ${{ inputs.gpu_type }}
          IMAGE_REGISTRY: ${{ inputs.image_registry }}
          IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
        run: ./auplc-installer pack

      - name: Verify bundle
        run: |
          BUNDLE=$(ls auplc-bundle-*.tar.gz)
          echo "Bundle: ${BUNDLE}"
          echo "Size: $(du -sh "${BUNDLE}" | cut -f1)"

          # Extract and verify structure
          tar tzf "${BUNDLE}" | head -30
          echo "---"
          echo "Total files: $(tar tzf "${BUNDLE}" | wc -l)"

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auplc-bundle-${{ inputs.gpu_type }}
          path: auplc-bundle-*.tar.gz
          retention-days: 7
          compression-level: 0  # already compressed

      - name: Create GitHub Release
        if: inputs.create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE=$(ls auplc-bundle-*.tar.gz)
          BUNDLE_NAME=$(basename "${BUNDLE}" .tar.gz)
          TAG="bundle-${{ inputs.gpu_type }}-$(date +%Y%m%d)"

          gh release create "${TAG}" "${BUNDLE}" \
            --title "Offline Bundle: ${{ inputs.gpu_type }} ($(date +%Y-%m-%d))" \
            --notes "$(cat <<EOF
          ## Offline Deployment Bundle

          - **GPU Type**: ${{ inputs.gpu_type }}
          - **Image Tag**: ${{ inputs.image_tag || github.ref_name }}
          - **Bundle**: ${BUNDLE_NAME}
          - **Built from**: ${{ github.sha }} (${{ github.ref_name }})

          ### Usage
          \`\`\`bash
          tar xzf ${BUNDLE}
          cd ${BUNDLE_NAME}
          sudo ./auplc-installer install
          \`\`\`
          EOF
          )"
          echo "Release created: ${TAG}"
